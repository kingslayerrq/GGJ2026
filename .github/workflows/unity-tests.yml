name: Unity Tests

on:
  pull_request:
  push:
    branches: [ main ]

# Needed so the action can annotate PRs / create check runs
permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  tests:
    name: EditMode + PlayMode Tests
    runs-on: ubuntu-latest

    # Force Unity prefs/cache to a writable location (NOT /root)
    env:
      HOME: ${{ github.workspace }}/.unity/home
      XDG_CACHE_HOME: ${{ github.workspace }}/.unity/cache
      XDG_DATA_HOME: ${{ github.workspace }}/.unity/data
      XDG_CONFIG_HOME: ${{ github.workspace }}/.unity/config

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Prepare Unity cache dirs
        run: |
          set -eux
          mkdir -p \
            "$HOME" \
            "$XDG_CACHE_HOME/unity3d" \
            "$XDG_DATA_HOME/unity3d" \
            "$XDG_CONFIG_HOME"
          chmod -R u+rwX,go+rwX "${{ github.workspace }}/.unity"

      - name: Cache Library
        uses: actions/cache@v5
        with:
          path: Library
          # avoid cross-restoring other caches
          key: Library-Tests-${{ runner.os }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-Tests-${{ runner.os }}-

      - name: Run Unity tests
        id: unity-tests
        uses: game-ci/unity-test-runner@v4.3.1
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          HOME: ${{ github.workspace }}/.unity/home
          XDG_CACHE_HOME: ${{ github.workspace }}/.unity/cache
          XDG_DATA_HOME: ${{ github.workspace }}/.unity/data
          XDG_CONFIG_HOME: ${{ github.workspace }}/.unity/config
        with:
          testMode: all
          githubToken: ${{ github.token }}