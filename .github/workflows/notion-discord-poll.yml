name: Notion → Discord (poll)

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Poll Notion and notify Discord
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATA_SOURCE_ID: ${{ secrets.NOTION_DATA_SOURCE_ID }}
          NOTION_VERSION: "2025-09-03"   # latest :contentReference[oaicite:8]{index=8}

          DISCORD_WEBHOOK_ASSIGNMENTS: ${{ secrets.DISCORD_WEBHOOK_ASSIGNMENTS }}
          DISCORD_WEBHOOK_DEADLINES: ${{ secrets.DISCORD_WEBHOOK_DEADLINES }}
          DISCORD_WEBHOOK_DONE: ${{ secrets.DISCORD_WEBHOOK_DONE }}

          REMIND_WITHIN_DAYS: "2"
        run: node scripts/notion_discord_poll.mjs