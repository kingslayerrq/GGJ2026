name: Engineering Task
description: Implementation task for gameplay/tools/UI/etc with scope + done criteria
title: "[TASK] "
labels:
  - type:task
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Gameplay
        - UI
        - Tools / Pipeline
        - Performance
        - Input
        - Camera
        - AI
        - Audio
        - VFX
        - Build / Platform
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / goal
      placeholder: "We need a pause menu that works on controller and KBM."
    validations:
      required: true

  - type: textarea
    id: approach
    attributes:
      label: Proposed approach
      description: High-level plan; link to design doc if exists.
      placeholder: |
        - Scenes affected:
        - Systems/components:
        - Data/assets:
    validations:
      required: false

  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of scope
      placeholder: "- Not doing settings submenus in this task."
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies / blockers
      placeholder: "- Needs UI mock from design\n- Needs input mapping confirmed"
    validations:
      required: false